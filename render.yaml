services:
  # ── Backend (Node/Express) ────────────────────────────────
  - type: web
    name: vitto-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false          # set manually in Render dashboard
      - key: JWT_SECRET
        sync: false          # set manually in Render dashboard
      - key: FRONTEND_URL
        value: https://vitto-frontend.onrender.com

  # ── Frontend (React/Vite static site) ────────────────────
  - type: web
    name: vitto-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://vitto-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
